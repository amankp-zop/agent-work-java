spring.application.name=alert-log-analyzer

# H2 Configuration
spring.datasource.url=jdbc:h2:mem:alertdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA Configuration
# This tells Hibernate to automatically create tables based on our Java classes
spring.jpa.hibernate.ddl-auto=update
# Show SQL in logs (useful for debugging)
spring.jpa.show-sql=true

# H2 Console (So you can view the DB in your browser)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==================== AWS Bedrock Configuration ====================
# Credentials are auto-discovered via IAM role on EC2 (no keys needed)
bedrock.model.id=anthropic.claude-3-5-sonnet-20241022-v2:0
bedrock.region=us-east-1

# ==================== Tavily Search API (free tier) ====================
# Get your free key at https://app.tavily.com
tavily.api.key=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

# ==================== Datadog API ====================
# Set real keys via environment variables DATADOG_API_KEY / DATADOG_APP_KEY
datadog.api.key=${DATADOG_API_KEY:your_datadog_api_key_here}
datadog.app.key=${DATADOG_APP_KEY:your_datadog_app_key_here}
datadog.api.site=https://api.us3.datadoghq.com